  <style>
    :root{

      --blue:#2563eb; --shadow:0 12px 30px rgba(154, 52, 18, .10);

    *{box-sizing:border-box}

    .panel{background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.6);padding:12px;border-radius:18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;color:#fff}
    .pill{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:6px 10px;font-size:14px;font-weight:700}
    .grid{display:grid;grid-template-columns:260px 1fr;gap:16px;margin-top:16px}
    .side{position:sticky;top:10px;align-self:start;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:var(--shadow)}
    .side h3{margin:4px 0 10px;font-size:16px}
    .progress{height:12px;background:#ffedd5;border-radius:999px;overflow:hidden;border:1px solid #fed7aa}
    .bar{height:100%;width:0;background:linear-gradient(90deg,#f97316,#facc15);transition:.25s}

    .nav a{display:flex;align-items:center;justify-content:center;min-height:36px;border-radius:12px;background:#fff7ed;color:#9a3412;text-decoration:none;font-weight:800;border:1px solid #fed7aa}
    .nav a.done{background:#dcfce7;color:#166534;border-color:#86efac}
    .card{background:var(--card);border:1px solid var(--line);border-radius:24px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
    .section-head{background:#fff7ed;border-bottom:1px solid var(--line);padding:14px 16px;display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
    .section-head h2{font-size:19px;margin:0;color:#9a3412}
    .scoretag{background:#ffedd5;border:1px solid #fed7aa;color:#9a3412;border-radius:999px;padding:5px 10px;font-weight:800;font-size:13px}
    .q{padding:16px;border-top:1px dashed #fed7aa}
    .q:first-of-type{border-top:0}
    .q h3{font-size:16px;margin:0 0 12px;line-height:1.45}
    .hint{font-size:13px;color:var(--muted);margin:6px 0 10px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .input-card{background:#fffaf5;border:1px solid #fed7aa;border-radius:16px;padding:10px;margin:8px 0}
    label{font-weight:700}
    input[type="text"],textarea,input[type="number"]{width:100%;border:1.5px solid #fdba74;background:#fff;border-radius:12px;padding:10px 11px;font-size:16px;outline:none;min-height:42px}
    input[type="text"]:focus,textarea:focus,input[type="number"]:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(249,115,22,.12)}
    textarea{min-height:82px;resize:vertical;line-height:1.7}
    .options{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
    .opt{display:flex;align-items:center;gap:6px;background:#fffaf5;border:1px solid #fed7aa;border-radius:14px;padding:9px 10px;min-height:42px}
    .opt input{width:18px;height:18px}
    .readbox{background:#f8fafc;border-left:5px solid #f97316;border-radius:16px;padding:14px;line-height:2;font-size:17px;margin:10px 0;white-space:pre-wrap}
    .manual{background:#f0f9ff;border:1px solid #bfdbfe;border-radius:16px;padding:10px;margin-top:10px;display:none}
    .manual.open{display:block}

    .checkline{font-size:14px;margin:6px 0;color:#4b5563}

    .footer-actions{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 12px;z-index:5}

    .badge{display:inline-flex;align-items:center;justify-content:center;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800;margin-left:6px}
    .wrongMark{outline:3px solid rgba(220,38,38,.18);background:#fff1f2!important;border-color:#fecdd3!important}

    .pairgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .mini-title{font-size:14px;color:#9a3412;font-weight:800;margin:6px 0}

  </style>

function speak(text){
  if(!voiceReady || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.92;
  u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}
function norm(s){ return String(s||'').replace(/[\s　。！？!?,，、；;：:（）()“”"']/g,'').toLowerCase(); }
function isMatch(value, answers){
  const v = norm(value);
  return answers.some(a => norm(a) === v);
}
function hasKeywords(value, words){
  const v = String(value||'');
  return words.every(w => v.includes(w));
}

function load(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }catch(e){ return {}; }
}
function saveVal(key,val){ const data=load(); data[key]=val; localStorage.setItem(STORE_KEY,JSON.stringify(data)); updateProgress(); }
function getVal(key){ return load()[key] ?? ''; }
function idFor(qid,idx){ return qid + '_' + idx; }
function renderExam(){
  const root = document.getElementById('exam');
  root.innerHTML = exam.map((sec, si)=>{
    const qs = sec.questions.map((q, qi)=>renderQuestion(q, si, qi)).join('');
    return `<section class="card" id="${sec.id}"><div class="section-head"><h2>${sec.title}</h2><span class="scoretag">${sec.score}分</span></div>${qs}</section>`;
  }).join('');
  bindInputs(); renderNav(); updateProgress();
}
function renderQuestion(q, si, qi){
  if(q.type==='text') return `<div class="q"><div class="readbox">${q.text}</div></div>`;
  let html = `<div class="q" id="${q.id}"><h3>${q.title||''} ${q.type==='manual'?'<span class="badge">家长给分</span>':''}</h3>`;
  if(q.body) html += `<div class="readbox">${q.body}</div>`;
  if(q.type==='fills' || q.type==='fillsFlexible'){
    html += `<div class="row">` + q.items.map((it,i)=>{
      const prompt = it[0], ans = it[1], score = it[2];
      return `<div class="input-card"><label>${prompt}</label><input type="text" data-key="${idFor(q.id,i)}" data-q="${q.id}" placeholder="写答案" value="${escapeHtml(getVal(idFor(q.id,i)))}"><div class="hint">${score}分</div></div>`
    }).join('') + `</div>`;
  }
  if(q.type==='radios'){
    html += q.items.map((it,i)=>`<div class="input-card"><label>${it.label}</label><div class="options">${it.opts.map(opt=>`<label class="opt"><input type="radio" name="${idFor(q.id,i)}" data-key="${idFor(q.id,i)}" data-q="${q.id}" value="${opt}" ${getVal(idFor(q.id,i))===opt?'checked':''}>${opt}</label>`).join('')}</div></div>`).join('');
  }
  if(q.type==='selects'){
    html += `<div class="pairgrid">` + q.items.map((it,i)=>`<div class="input-card"><label>${it.label}</label><select data-key="${idFor(q.id,i)}" data-q="${q.id}" style="width:100%;margin-top:8px;border:1.5px solid #fdba74;border-radius:12px;padding:10px;font-size:16px;background:#fff"><option value="">请选择</option>${it.opts.map(opt=>`<option value="${opt}" ${getVal(idFor(q.id,i))===opt?'selected':''}>${opt}</option>`).join('')}</select></div>`).join('') + `</div>`;
  }
  if(q.type==='judge'){
    html += q.items.map((it,i)=>`<div class="input-card"><label>${it.label}</label><div class="options"><label class="opt"><input type="radio" name="${idFor(q.id,i)}" data-key="${idFor(q.id,i)}" data-q="${q.id}" value="√" ${getVal(idFor(q.id,i))==='√'?'checked':''}>√</label><label class="opt"><input type="radio" name="${idFor(q.id,i)}" data-key="${idFor(q.id,i)}" data-q="${q.id}" value="×" ${getVal(idFor(q.id,i))==='×'?'checked':''}>×</label></div></div>`).join('');
  }
  if(q.type==='choices'){
    html += q.items.map((it,i)=>`<div class="input-card"><label>${it.label}</label><div class="options">${it.opts.map(opt=>`<label class="opt"><input type="radio" name="${idFor(q.id,i)}" data-key="${idFor(q.id,i)}" data-q="${q.id}" value="${opt[0]}" ${getVal(idFor(q.id,i))===opt[0]?'checked':''}>${opt}</label>`).join('')}</div></div>`).join('');
  }
  if(q.type==='manual'){
    html += `<textarea data-key="${q.id}_manual" data-q="${q.id}" placeholder="${q.placeholder||'请写答案'}">${escapeHtml(getVal(q.id+'_manual'))}</textarea>`;
    html += `<div class="manual" id="manual_${q.id}"><div class="mini-title">家长参考答案 / 给分</div><div class="answer show">${q.answer}</div><div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px"><label>本题得分：</label><input type="number" min="0" max="${q.score}" step="0.5" data-manual-score="${q.id}" value="${escapeHtml(getVal('score_'+q.id))}" style="max-width:110px"> <span class="hint">满分 ${q.score} 分</span></div></div>`;
  }
  if(q.type!=='manual' && q.type!=='text') html += `<div class="answer" id="ans_${q.id}">${answerText(q)}</div>`;
  html += `</div>`;
  return html;
}
function answerText(q){
  if(q.type==='fills') return '答案：' + q.items.map(x=>x[1]).join('、');
  if(q.type==='fillsFlexible') return '参考答案：' + q.items.map(x=>Array.isArray(x[1])?x[1][0]:x[1]).join('、');
  if(q.type==='radios'||q.type==='selects'||q.type==='judge') return '答案：' + q.items.map(x=>`${x.label}：${x.ans}`).join('；');
  if(q.type==='choices') return '答案：' + q.items.map((x,i)=>`第${i+1}题 ${x.ans}`).join('；');
  return '';
}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function bindInputs(){
  document.querySelectorAll('[data-key]').forEach(el=>{
    const ev = el.tagName==='SELECT' || el.type==='radio' ? 'change' : 'input';
    el.addEventListener(ev, e=> saveVal(el.dataset.key, el.value));
  });
  document.querySelectorAll('[data-manual-score]').forEach(el=>{
    el.addEventListener('input', e=> saveVal('score_'+el.dataset.manualScore, el.value));
  });
}
function renderNav(){
  document.getElementById('nav').innerHTML = exam.map((s,i)=>`<a href="#${s.id}" id="nav_${s.id}">${i+1}</a>`).join('');
}
function allAnswerKeys(){
  const keys=[];
  exam.forEach(sec=>sec.questions.forEach(q=>{
    if(['fills','fillsFlexible','radios','selects','judge','choices'].includes(q.type)) q.items.forEach((it,i)=>keys.push(idFor(q.id,i)));
    if(q.type==='manual') keys.push(q.id+'_manual');
  }));
  return keys;
}
function updateProgress(){
  const data=load(); const keys=allAnswerKeys();
  const done = keys.filter(k=>String(data[k]||'').trim()!=='').length;
  const pct = Math.round(done/keys.length*100);
  document.getElementById('bar').style.width = pct+'%';
  document.getElementById('progressText').textContent = `已完成 ${done}/${keys.length} 项，约 ${pct}%`;
  exam.forEach(sec=>{
    const secKeys=[]; sec.questions.forEach(q=>{
      if(['fills','fillsFlexible','radios','selects','judge','choices'].includes(q.type)) q.items.forEach((it,i)=>secKeys.push(idFor(q.id,i)));
      if(q.type==='manual') secKeys.push(q.id+'_manual');
    });
    const ok = secKeys.length && secKeys.every(k=>String(data[k]||'').trim()!=='');
    const nav=document.getElementById('nav_'+sec.id); if(nav) nav.classList.toggle('done', ok);
  });
}
function grade(){
  let auto=0, autoMax=0, wrong=[];
  document.querySelectorAll('.wrongMark,.rightMark').forEach(e=>e.classList.remove('wrongMark','rightMark'));
  exam.forEach(sec=>sec.questions.forEach(q=>{
    if(q.type==='fills') q.items.forEach((it,i)=>{autoMax+=it[2]; const k=idFor(q.id,i); const el=document.querySelector(`[data-key="${k}"]`); if(isMatch(getVal(k),[it[1]])){auto+=it[2]; el&&el.classList.add('rightMark')} else {wrong.push(`${q.title}：${it[0]}`); el&&el.classList.add('wrongMark')}});
    if(q.type==='fillsFlexible') q.items.forEach((it,i)=>{autoMax+=it[2]; const k=idFor(q.id,i); const el=document.querySelector(`[data-key="${k}"]`); const arr=Array.isArray(it[1])?it[1]:[it[1]]; if(isMatch(getVal(k),arr)){auto+=it[2]; el&&el.classList.add('rightMark')} else {wrong.push(`${q.title}：${it[0]}`); el&&el.classList.add('wrongMark')}});
    if(['radios','selects','judge','choices'].includes(q.type)) q.items.forEach((it,i)=>{autoMax+=it.score; const k=idFor(q.id,i); const nodes=document.querySelectorAll(`[data-key="${k}"]`); if(getVal(k)===it.ans){auto+=it.score; nodes.forEach(n=>n.closest('.input-card')?.classList.add('rightMark'))} else {wrong.push(`${q.title}：${it.label}`); nodes.forEach(n=>n.closest('.input-card')?.classList.add('wrongMark'))}});
  }));
  let manual=0, manualMax=0;
  exam.forEach(sec=>sec.questions.forEach(q=>{ if(q.type==='manual'){ manualMax+=q.score; const v=parseFloat(getVal('score_'+q.id)); if(!isNaN(v)) manual += Math.max(0, Math.min(q.score, v)); }}));
  const total = auto + manual;
  const max = autoMax + manualMax;
  const msg = total>=90 ? `乐桐太棒了，总分已经很高啦！` : total>=75 ? `乐桐做得不错，再把错题改一改！` : `乐桐已经完成试卷啦，咱们慢慢改错继续进步！`;
  document.getElementById('resultBox').classList.add('show');
  document.getElementById('resultBox').innerHTML = `<div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap"><div><div class="hint">本次成绩</div><div class="bigscore">${total}/${max}</div></div><div><button onclick="scrollToWrong()">查看错题</button> <button class="secondary" onclick="toggleAnswers(true)">打开参考答案</button></div></div><p><strong>${msg}</strong></p><p class="checkline">客观题自动得分：${auto}/${autoMax}；主观题家长给分：${manual}/${manualMax}。</p><p class="checkline">错题数量：${wrong.length} 项。红色题目请重点复习。</p>`;
  speak(msg);
  window.scrollTo({top:0,behavior:'smooth'});
}
function scrollToWrong(){ const el=document.querySelector('.wrongMark'); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }
function toggleAnswers(force){
  answersVisible = force===true ? true : !answersVisible;
  document.querySelectorAll('.answer').forEach(el=>el.classList.toggle('show', answersVisible));
  document.querySelectorAll('.manual').forEach(el=>el.classList.toggle('open', answersVisible));
  document.getElementById('showAnswers').textContent = answersVisible ? '隐藏答案' : '👨‍👩‍👧 家长答案';
}
function fmt(sec){ const m=String(Math.floor(sec/60)).padStart(2,'0'); const s=String(sec%60).padStart(2,'0'); return `${m}:${s}`; }
function tick(){ if(leftSeconds>0) leftSeconds--; document.getElementById('timer').textContent=fmt(leftSeconds); document.getElementById('timer2').textContent=fmt(leftSeconds); if(leftSeconds===5*60) speak('乐桐，还有五分钟，记得检查一下。'); }
function startTimer(){ if(timerRunning) return; timerRunning=true; timerHandle=setInterval(tick,1000); speak('乐桐，开始考试啦，认真读题，慢慢做。'); }

document.getElementById('startVoice').onclick=()=>{ voiceReady=true; speak('语音打开啦，乐桐加油！'); };
document.getElementById('startTimer').onclick=startTimer;
document.getElementById('printBtn').onclick=()=>window.print();
document.getElementById('submitBtn').onclick=grade;
document.getElementById('showAnswers').onclick=()=>toggleAnswers();
document.getElementById('clearBtn').onclick=()=>{ if(confirm('确定要清空所有答案吗？')){ localStorage.removeItem(STORE_KEY); location.reload(); } };
renderExam();
</script>
</body>
</html>
